name: Protocol

on:
  pull_request:
    paths:
      - 'protocol/**'
      - 'docs/examples/**'
      - '.github/workflows/models.yml'
  push:
    branches:
      - main
    paths:
      - 'protocol/**'
      - 'docs/examples/**'
      - '.github/workflows/models.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Compile TypeSpec schemas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: protocol
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: protocol/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeSpec
        run: npm run build

      - name: Verify tsp-output is committed
        run: |
          if ! git diff --exit-code tsp-output/; then
            echo "::error::tsp-output/ has uncommitted changes — run 'npm run build' in protocol/ and commit the result."
            exit 1
          fi

      - name: Fixture corpus parity (Rust vs. Node validators)
        run: node run-fixtures.mjs

      - name: Canonical example validates
        run: node validate.mjs ../docs/examples/hello.json
