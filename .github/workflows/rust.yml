name: Rust

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.cargo/**'
      - '.github/workflows/rust.yml'
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.cargo/**'
      - '.github/workflows/rust.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Doc check
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Tests (nextest)
        run: cargo nextest run --workspace

  smoke:
    name: Smoke (tmux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: smoke

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Run tmux smoke walkthrough
        run: scripts/smoke.sh

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Check MSRV
        run: cargo check --workspace --all-targets

  coverage:
    name: Coverage (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest

      - name: Run tests under instrumentation
        run: cargo llvm-cov nextest --workspace --no-report

      - name: Coverage summary
        run: cargo llvm-cov report --summary-only >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload lcov report
        uses: actions/upload-artifact@v4
        with:
          name: lcov.info
          path: lcov.info
